<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="アゴラコード - 学籍番号からバーコードを生成するWebアプリ">
    <title>アゴラコード</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* === リセット・基本設定 === */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: #FFFFFF;
        }

        /* === アプリコンテナ === */
        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            background: #FFFFFF;
            position: relative;
        }

        /* === ヘッダー === */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 0;
            border-bottom: 1px solid #F2F2F7;
            flex-shrink: 0;
        }

        .header-icon {
            width: 24px;
            height: 24px;
            margin-right: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-icon svg {
            width: 24px;
            height: 24px;
        }

        .header-title {
            font-weight: 700;
            font-size: 20px;
            color: #000;
        }

        /* === コンテンツエリア（バーコード表示部分） === */
        .content {
            flex: 1;
            padding: 20px 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-y: auto;
            min-height: 0;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }

        .content::-webkit-scrollbar {
            display: none; /* Chrome/Safari/Edge */
        }

        .barcode-container {
            width: 100%;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #F9F9F9;
            border-radius: 16px;
            border: 1px solid #EFEFEF;
            padding: 10px;
        }

        .barcode-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 8px;
        }

        .barcode-wrapper svg {
          width: 45mm;
            height: 7mm;
            display: block;
            margin: 0 auto; /* 確実な中央揃えのために追加 */
        }

        .barcode-value-text {
            font-weight: 600;
            font-size: 18px;
            letter-spacing: 2px;
            color: #333;
        }

        .placeholder-text {
            font-weight: 400;
            color: #aaa;
            font-size: 14px;
        }

        /* === 注意書き === */
        .notice {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            background: #FFF8EE;
            border-radius: 10px;
            border: 1px solid #FFE0B2;
            padding: 12px;
            margin-top: 16px;
            width: 100%;
        }

        .notice-icon {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            color: #FF9500;
        }

        .notice-text {
            font-size: 12px;
            color: #795600;
            line-height: 1.5;
            flex: 1;
        }

        /* === 下部コントロール === */
        .bottom-controls {
            padding: 0 16px 20px;
            flex-shrink: 0;
        }

        /* === 入力表示 === */
        .input-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-label {
            font-weight: 600;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #EAEAEA;
        }

        .input-text {
            font-weight: 700;
            font-size: 40px;
            color: #000;
            letter-spacing: 4px;
            text-align: center;
        }

        .input-text.placeholder {
            color: #E0E0E0;
        }

        /* === テンキー === */
        .keypad {
            padding: 0 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .keypad-row {
            display: flex;
            gap: 12px;
        }

        .key-btn {
            flex: 1;
            height: 60px;
            background: #F2F2F7;
            border: none;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 500;
            color: #000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            transition: background-color 0.1s ease, transform 0.1s ease;
            font-family: 'Inter', sans-serif;
        }

        .key-btn:active {
            background: #E5E5EA;
            transform: scale(0.96);
        }

        .key-btn.empty {
            background: transparent;
            box-shadow: none;
            cursor: default;
        }

        .key-btn.delete svg {
            width: 28px;
            height: 28px;
        }

        /* === 作成ボタン === */
        .create-btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 18px;
            color: #FFFFFF;
            cursor: pointer;
            transition: background-color 0.2s ease, box-shadow 0.2s ease, transform 0.1s ease;
        }

        .create-btn.active {
            background: #007AFF;
            box-shadow: 0 2px 8px rgba(0, 122, 255, 0.3);
        }

        .create-btn.active:active {
            background: #006ADF;
            transform: scale(0.98);
        }

        .create-btn.disabled {
            background: #E5E5EA;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* === 環境依存フォールバック === */
        @supports not (height: 100dvh) {
            #app {
                height: 100vh;
            }
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="header">
            <div class="header-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" stroke="currentColor"
                    stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M80 96v320M160 96v320M240 96v320M320 96v320M400 96v320M448 96v320M64 96v320" />
                </svg>
            </div>
            <span class="header-title">アゴラコード</span>
        </div>

        <div class="content">
            <div class="barcode-container" id="barcodeContainer">
                <span class="placeholder-text" id="placeholder">ここにバーコードが表示されます</span>
                <div class="barcode-wrapper" id="barcodeWrapper" style="display:none;">
                    <svg id="barcodeSvg"></svg>
                    <span class="barcode-value-text" id="barcodeValueText"></span>
                </div>
            </div>

            <div class="notice">
                <svg class="notice-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none"
                    stroke="currentColor" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="256" cy="256" r="208" />
                    <path d="M256 176v144" />
                    <circle cx="256" cy="384" r="8" fill="currentColor" />
                </svg>
                <span class="notice-text">
                    Web版のため、明るさの自動調整機能はありません。<br>
                    バーコードを読み取る際は、手動で画面の明るさを最大にしてください。
                </span>
            </div>
        </div>

        <div class="bottom-controls">
            <div class="input-display" id="inputDisplay">
                <div class="input-label">学籍番号 (7桁)</div>
                <div class="input-field">
                    <span class="input-text placeholder" id="inputText">-------</span>
                </div>
            </div>

            <div class="keypad">
                <div class="keypad-row">
                    <button class="key-btn" data-digit="1">1</button>
                    <button class="key-btn" data-digit="2">2</button>
                    <button class="key-btn" data-digit="3">3</button>
                </div>
                <div class="keypad-row">
                    <button class="key-btn" data-digit="4">4</button>
                    <button class="key-btn" data-digit="5">5</button>
                    <button class="key-btn" data-digit="6">6</button>
                </div>
                <div class="keypad-row">
                    <button class="key-btn" data-digit="7">7</button>
                    <button class="key-btn" data-digit="8">8</button>
                    <button class="key-btn" data-digit="9">9</button>
                </div>
                <div class="keypad-row">
                    <button class="key-btn empty"></button>
                    <button class="key-btn" data-digit="0">0</button>
                    <button class="key-btn delete" id="deleteBtn" aria-label="削除">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" stroke="currentColor"
                            stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
                            <path
                                d="M135.19 390.14a28.79 28.79 0 0021.68 9.86h246.26A29 29 0 00432 371.13V140.87A29 29 0 00403.13 112H156.87a28.84 28.84 0 00-21.67 9.84L46.33 256z" />
                            <line x1="336" y1="176" x2="224" y2="336" />
                            <line x1="224" y1="176" x2="336" y2="336" />
                        </svg>
                    </button>
                </div>
            </div>

            <button class="create-btn disabled" id="createBtn" disabled>バーコードを作成</button>
        </div>
    </div>

    <script>
        // === 状態管理 ===
        let studentId = '';
        let isGenerated = false;

        // === DOM要素 ===
        const inputText = document.getElementById('inputText');
        const inputDisplay = document.getElementById('inputDisplay');
        const placeholder = document.getElementById('placeholder');
        const barcodeWrapper = document.getElementById('barcodeWrapper');
        const barcodeSvg = document.getElementById('barcodeSvg');
        const barcodeValueText = document.getElementById('barcodeValueText');
        const createBtn = document.getElementById('createBtn');
        const deleteBtn = document.getElementById('deleteBtn');

        // === UI更新 ===
        function updateUI() {
            // 入力テキスト更新
            if (studentId.length === 0) {
                inputText.textContent = '-------';
                inputText.classList.add('placeholder');
            } else {
                inputText.textContent = studentId;
                inputText.classList.remove('placeholder');
            }

            // ボタン状態更新
            const isButtonEnabled = studentId.length === 7 && !isGenerated;
            if (isButtonEnabled) {
                createBtn.classList.remove('disabled');
                createBtn.classList.add('active');
                createBtn.disabled = false;
            } else {
                createBtn.classList.remove('active');
                createBtn.classList.add('disabled');
                createBtn.disabled = true;
            }

            // 入力欄の表示/非表示
            inputDisplay.style.display = isGenerated ? 'none' : 'block';

            // バーコード表示
            if (isGenerated) {
                placeholder.style.display = 'none';
                barcodeWrapper.style.display = 'flex';
            } else {
                placeholder.style.display = 'block';
                barcodeWrapper.style.display = 'none';
            }
        }

        // === バーコード生成 ===
        function generateBarcode() {
            if (studentId.length !== 7) return;

            const barcodeValue = 'a' + studentId + '0a';
            isGenerated = true;

            // 前回の描画内容や属性をクリアして初期化（ズレ防止）
            barcodeSvg.innerHTML = '';
            barcodeSvg.removeAttribute('viewBox');
            barcodeSvg.removeAttribute('preserveAspectRatio');

            try {
                JsBarcode('#barcodeSvg', barcodeValue, {
                    format: 'codabar',
                    displayValue: false,
                    margin: 0,
                    background: 'transparent',
                });

                // parseFloatを使用して確実に数値のみを抽出する
                // これにより、単位付きの無効なviewBoxが生成されるのを防ぐ
                const w = parseFloat(barcodeSvg.getAttribute('width'));
                const h = parseFloat(barcodeSvg.getAttribute('height'));

                if (!isNaN(w) && !isNaN(h)) {
                    barcodeSvg.setAttribute('viewBox', `0 0 ${w} ${h}`);
                    barcodeSvg.removeAttribute('width');
                    barcodeSvg.removeAttribute('height');
                    barcodeSvg.setAttribute('preserveAspectRatio', 'none');
                }

                barcodeValueText.textContent = barcodeValue;
            } catch (e) {
                console.error('バーコード生成エラー:', e);
            }

            updateUI();
        }

        // === 数字入力ハンドラ ===
        function handleDigit(digit) {
            if (isGenerated) {
                isGenerated = false;
                studentId = digit;
            } else {
                if (studentId.length < 7) {
                    studentId += digit;
                }
            }
            updateUI();
        }

        // === 削除ハンドラ ===
        function handleDelete() {
            if (isGenerated) {
                isGenerated = false;
                updateUI();
            } else {
                studentId = studentId.slice(0, -1);
                updateUI();
            }
        }

        // === 全削除（長押し）ハンドラ ===
        function handleLongPressDelete() {
            studentId = '';
            isGenerated = false;
            updateUI();
        }

        // === イベント登録 ===
        document.querySelectorAll('.key-btn[data-digit]').forEach(btn => {
            btn.addEventListener('click', () => {
                handleDigit(btn.dataset.digit);
            });
        });

        deleteBtn.addEventListener('click', handleDelete);

        let longPressTimer = null;
        deleteBtn.addEventListener('touchstart', (e) => {
            longPressTimer = setTimeout(() => {
                handleLongPressDelete();
                longPressTimer = null;
            }, 500);
        }, { passive: true });

        deleteBtn.addEventListener('touchend', () => {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        });

        deleteBtn.addEventListener('touchcancel', () => {
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        });

        createBtn.addEventListener('click', generateBarcode);

        updateUI();
    </script>
</body>

</html>
